name: PayFlow CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Install shared library
        run: mvn install -f shared/pom.xml -DskipTests

      - name: Cache shared artifact
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/com/B2B
          key: shared-${{ github.sha }}

  test-payment-service:
    needs: build-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Restore shared artifact
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/com/B2B
          key: shared-${{ github.sha }}
      - name: Test payment-service
        run: mvn test -f services/payment-service/pom.xml

  test-account-service:
    needs: build-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Restore shared artifact
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/com/B2B
          key: shared-${{ github.sha }}
      - name: Test account-service
        run: mvn test -f services/account-service/pom.xml

  test-notification-service:
    needs: build-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Restore shared artifact
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/com/B2B
          key: shared-${{ github.sha }}
      - name: Test notification-service
        run: mvn test -f services/notification-service/pom.xml
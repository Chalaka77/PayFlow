server:
  port: 8080


jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: payment-route
          uri: http://localhost:8081
          predicates:
            - Path=/payment/**
        - id: auth-route
          uri: http://localhost:8084
          predicates:
            - Path=/auth/**
        - id: account-route
          uri: http://localhost:8082
          predicates:
            - Path=/account/**
